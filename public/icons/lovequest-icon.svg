    />

    <!-- 男生（右）：頭 + 肩線 + 雙腿 + 伸手向愛心 -->
    <circle cx="370" cy="162" r="36"/>
    <path d="M338 200 L370 192 L402 200"/>
    <path d="M350 200 L350 302 M390 200 L390 302"/>
    <path d="M338 224 Q308 214 298 244"/>
