<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="LoveQuest">
  <defs>
    <linearGradient id="bg" x1="8%" y1="4%" x2="92%" y2="96%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="38%" stop-color="#f9a8d4"/>
      <stop offset="72%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="heartFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff1f2"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Full-bleed background (no white border) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Subtle inner vignette for depth -->
  <rect width="512" height="512" fill="url(#bg)" opacity="0.92"/>
  <ellipse cx="256" cy="430" rx="200" ry="70" fill="#be185d" opacity="0.12"/>

  <g filter="url(#softGlow)" transform="translate(256 268)">
    <!-- Left heart (partner A) -->
    <path
      fill="url(#heartFill)"
      d="M-92 18 C-92 -42 -18 -78 0 -28 C18 -78 92 -42 92 18 C92 78 0 132 0 132 C0 132 -92 78 -92 18 Z"
      transform="translate(-54 8) rotate(-12)"
    />
    <!-- Right heart (partner B) -->
    <path
      fill="url(#heartFill)"
      opacity="0.96"
      d="M-92 18 C-92 -42 -18 -78 0 -28 C18 -78 92 -42 92 18 C92 78 0 132 0 132 C0 132 -92 78 -92 18 Z"
      transform="translate(54 8) rotate(12)"
    />
    <!-- Center link sparkle -->
    <circle cx="0" cy="-8" r="14" fill="#ffffff" opacity="0.95"/>
    <path
      fill="#fb7185"
      d="M0 -22 L4 -6 L20 -6 L7 4 L12 20 L0 10 L-12 20 L-7 4 L-20 -6 L-4 -6 Z"
      transform="scale(0.55)"
    />
  </g>

  <!-- Bottom accent curve (couple / journey) -->
  <path
    fill="none"
    stroke="#ffffff"
    stroke-width="10"
    stroke-linecap="round"
    opacity="0.35"
    d="M96 380 Q256 420 416 380"
  />
</svg>
